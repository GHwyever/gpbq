<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高攀不起 - Kling O3 1080P 总控指南</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --text: #e8e8f0;
    --text-muted: #8888a0;
    --accent-gold: #d4a574;
    --accent-gold-dim: rgba(212,165,116,0.15);
    --accent-coral: #e85d5d;
    --accent-blue: #5d8ae8;
    --border: #1e1e2e;
    --border-hover: #2a2a3e;
    --success: #4ade80;
    --warning: #fbbf24;
    --danger: #ef4444;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ===== 顶部导航 ===== */
  .top-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-tabs {
    display: flex;
    gap: 4px;
  }
  .nav-tab {
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: transparent;
    color: var(--text-muted);
  }
  .nav-tab:hover:not(.disabled) {
    background: var(--border-hover);
    color: var(--text);
  }
  .nav-tab.active {
    background: var(--accent-gold-dim);
    color: var(--accent-gold);
    box-shadow: 0 0 0 1px var(--accent-gold);
  }
  .nav-tab.disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .nav-logo {
    font-size: 13px;
    color: var(--accent-gold);
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* ===== 模式切换 ===== */
  .mode-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px 24px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .mode-btn {
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-muted);
  }
  .mode-btn:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }
  .mode-btn.active {
    background: var(--accent-gold-dim);
    color: var(--accent-gold);
    border-color: var(--accent-gold);
  }

  /* ===== 主容器 ===== */
  .main-container {
    display: flex;
    max-width: 1600px;
    margin: 0 auto;
    gap: 20px;
    padding: 20px;
  }
  .left-panel {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .center-panel {
    flex: 1;
    min-width: 0;
  }
  .right-panel {
    width: 320px;
    flex-shrink: 0;
  }

  /* ===== 参考图区 ===== */
  .panel-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .panel-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-gold);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .panel-title .icon {
    width: 16px;
    height: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }

  /* ===== 素材库分类标签 ===== */
  .asset-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .asset-tab {
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: transparent;
    color: var(--text-muted);
    position: relative;
    flex: 1;
    text-align: center;
  }
  .asset-tab::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: transparent;
    transition: all 0.2s;
  }
  .asset-tab:hover {
    color: var(--text);
  }
  .asset-tab:hover::after {
    background: rgba(212,165,116,0.3);
  }
  .asset-tab.active {
    color: var(--accent-gold);
    font-weight: 600;
  }
  .asset-tab.active::after {
    background: var(--accent-gold);
  }
  .asset-tab .tab-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 16px;
    height: 16px;
    border-radius: 8px;
    background: var(--border);
    font-size: 10px;
    margin-left: 4px;
    padding: 0 4px;
    color: var(--text-muted);
  }
  .asset-tab.active .tab-count {
    background: var(--accent-gold-dim);
    color: var(--accent-gold);
  }

  /* ===== 素材卡片网格 ===== */
  .asset-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 420px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .asset-grid::-webkit-scrollbar { width: 4px; }
  .asset-grid::-webkit-scrollbar-track { background: transparent; }
  .asset-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .asset-card {
    display: flex;
    gap: 10px;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg);
    align-items: center;
  }
  .asset-card:hover {
    border-color: var(--accent-gold);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(212,165,116,0.1);
  }
  .asset-card .asset-thumb {
    width: 64px;
    height: 64px;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .asset-card .asset-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .asset-card .asset-details {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .asset-card .asset-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .asset-card .asset-usage {
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .asset-card .asset-status {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 500;
    margin-top: 2px;
  }
  .asset-card .asset-status .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .asset-status.ready .status-dot { background: var(--success); }
  .asset-status.ready { color: var(--success); }
  .asset-status.pending .status-dot { background: var(--text-muted); }
  .asset-status.pending { color: var(--text-muted); }

  /* ===== 待生成素材卡片 ===== */
  .asset-card.pending-card {
    border-style: dashed;
    border-color: var(--border);
    opacity: 0.7;
  }
  .asset-card.pending-card:hover {
    opacity: 1;
    border-color: var(--accent-gold);
  }
  .asset-card.pending-card .asset-thumb {
    background: var(--border);
  }
  .asset-card.pending-card .asset-thumb .pending-icon {
    font-size: 24px;
    opacity: 0.3;
  }
  .asset-card.pending-card .asset-name {
    color: var(--text-muted);
  }

  /* ===== 旧 ref-grid / ref-item 保留兼容 ===== */
  .ref-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .ref-item {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg);
  }
  .ref-item:hover {
    border-color: var(--accent-gold);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(212,165,116,0.1);
  }
  .ref-item img {
    width: 100%;
    height: 90px;
    object-fit: cover;
    display: block;
  }
  .ref-item .ref-info {
    padding: 6px 8px;
    font-size: 11px;
  }
  .ref-item .ref-name {
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ref-item .ref-tag {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .ref-placeholder {
    width: 100%;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text-muted);
    font-size: 11px;
    text-align: center;
    padding: 8px;
  }

  /* ===== 分集列表 ===== */
  .episode-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: calc(100vh - 200px);
    overflow-y: auto;
    padding-right: 4px;
  }
  .episode-list::-webkit-scrollbar { width: 4px; }
  .episode-list::-webkit-scrollbar-track { background: transparent; }
  .episode-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .chapter-label {
    font-size: 11px;
    color: var(--accent-gold);
    font-weight: 600;
    padding: 8px 4px 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .episode-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
    background: transparent;
  }
  .episode-item:hover {
    background: var(--border-hover);
    border-color: var(--border);
  }
  .episode-item.active {
    background: var(--accent-gold-dim);
    border-color: var(--accent-gold);
  }
  .episode-num {
    width: 32px;
    height: 32px;
    background: var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    flex-shrink: 0;
  }
  .episode-item.active .episode-num {
    background: var(--accent-gold);
    color: var(--bg);
  }
  .episode-info {
    flex: 1;
    min-width: 0;
  }
  .episode-title {
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .episode-meta {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
    display: flex;
    gap: 8px;
  }
  .episode-status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-wait { background: var(--text-muted); }
  .status-progress { background: var(--warning); }
  .status-done { background: var(--success); }

  /* ===== Prompt 区 ===== */
  .prompt-area {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .prompt-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }
  .prompt-header h2 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent-gold);
  }
  .prompt-header .meta {
    font-size: 12px;
    color: var(--text-muted);
  }
  .shot-tabs {
    display: flex;
    gap: 4px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .shot-tab {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .shot-tab:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }
  .shot-tab.active {
    background: var(--accent-gold-dim);
    color: var(--accent-gold);
    border-color: var(--accent-gold);
  }
  .prompt-body {
    padding: 20px;
  }
  .prompt-section {
    margin-bottom: 16px;
  }
  .prompt-section:last-child {
    margin-bottom: 0;
  }
  .prompt-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent-gold);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .prompt-content {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .prompt-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .btn {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: var(--accent-gold);
    color: var(--bg);
  }
  .btn-primary:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }
  .btn-secondary {
    background: var(--border);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover {
    background: var(--border-hover);
  }
  .btn-sm {
    padding: 6px 12px;
    font-size: 11px;
  }

  /* ===== 底部参数栏 ===== */
  .params-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .param-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .param-label {
    font-size: 11px;
    color: var(--text-muted);
  }
  .param-options {
    display: flex;
    gap: 4px;
  }
  .param-btn {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-muted);
  }
  .param-btn:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }
  .param-btn.active {
    background: var(--accent-gold-dim);
    color: var(--accent-gold);
    border-color: var(--accent-gold);
  }
  .param-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }
  .generate-btn {
    margin-left: auto;
    padding: 8px 24px;
    background: linear-gradient(135deg, var(--accent-gold), #c49464);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .generate-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(212,165,116,0.3);
  }
  .generate-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ===== 帧图区 ===== */
  .frames-area {
    display: flex;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.15);
  }
  .frame-box {
    flex: 1;
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .frame-box.has-image {
    border-style: solid;
    border-color: var(--border);
    padding: 0;
    overflow: hidden;
  }
  .frame-box img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    display: block;
  }
  .frame-label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .frame-placeholder {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ===== 参考图详情 ===== */
  .ref-detail {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.1);
  }
  .ref-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--text);
  }
  .ref-chip img {
    width: 20px;
    height: 20px;
    border-radius: 3px;
    object-fit: cover;
  }

  /* ===== 图片放大模态框 ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
  }
  .modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }
  .modal-content {
    max-width: 90vw;
    max-height: 90vh;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .modal-content img {
    max-width: 100%;
    max-height: 70vh;
    border-radius: 8px;
    display: block;
    object-fit: contain;
  }
  .modal-close {
    position: absolute;
    top: -40px;
    right: 0;
    color: var(--text);
    font-size: 24px;
    cursor: pointer;
    background: none;
    border: none;
  }
  .modal-info {
    margin-top: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    width: 100%;
    max-width: 600px;
  }
  .modal-info-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 0;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
  }
  .modal-info-row:last-child {
    border-bottom: none;
  }
  .modal-info-label {
    color: var(--accent-gold);
    font-weight: 600;
    white-space: nowrap;
    min-width: 70px;
  }
  .modal-info-value {
    color: var(--text);
    word-break: break-all;
    flex: 1;
  }
  .modal-info-value .file-path {
    font-family: 'SF Mono', 'Consolas', monospace;
    font-size: 11px;
    background: var(--bg);
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    display: inline-block;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-info-value .file-path:hover {
    border-color: var(--accent-gold);
    color: var(--accent-gold);
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    justify-content: center;
  }
  .modal-actions .btn {
    padding: 8px 20px;
    font-size: 12px;
  }
  .modal-caption {
    text-align: center;
    margin-top: 8px;
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ===== 响应式 ===== */
  @media (max-width: 1200px) {
    .main-container {
      flex-direction: column;
    }
    .left-panel, .right-panel {
      width: 100%;
    }
    .episode-list {
      max-height: 300px;
    }
  }
  @media (max-width: 768px) {
    .top-nav {
      padding: 0 12px;
    }
    .main-container {
      padding: 12px;
    }
    .params-bar {
      gap: 8px;
    }
    .param-divider {
      display: none;
    }
    .generate-btn {
      width: 100%;
      margin-left: 0;
      margin-top: 8px;
      justify-content: center;
    }
  }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card);
    color: var(--accent-gold);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;

// ==================== 状态 ====================
let currentEpisode = 1;
let currentShotIndex = 0;
let currentSubShotIndex = 0;
let audioEnabled = true;
let currentRatio = '9:16';
let currentDuration = '10s';
let currentAssetTab = 'characters';
let currentModalAsset = null;

// ==================== 初始化 ====================
function init() {
  renderAssetGrid();
  updateAssetCounts();
  renderEpisodeList();
  loadEpisode(1);
  setupLazyLoad();
}

// ==================== 渲染素材库（分类标签页） ====================
function switchAssetTab(category) {
  currentAssetTab = category;
  document.querySelectorAll('.asset-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.category === category);
  });
  renderAssetGrid();
}

function updateAssetCounts() {
  document.getElementById('count-characters').textContent = assetData.characters.length;
  document.getElementById('count-scenes').textContent = assetData.scenes.length;
  document.getElementById('count-costumes').textContent = assetData.costumes.length;
  document.getElementById('count-props').textContent = assetData.props.length;
  document.getElementById('count-pending').textContent = assetData.pending.length;
}

function renderAssetGrid() {
  const grid = document.getElementById('assetGrid');
  const items = assetData[currentAssetTab] || [];

  if (items.length === 0) {
    grid.innerHTML = '<div style="text-align:center; padding:24px; color:var(--text-muted); font-size:12px;">暂无素材</div>';
    return;
  }

  grid.innerHTML = items.map(item => {
    if (item.status === 'pending') {
      return `
        <div class="asset-card pending-card">
          <div class="asset-thumb">
            <span class="pending-icon">&#128247;</span>
          </div>
          <div class="asset-details">
            <div class="asset-name">${item.name}</div>
            <div class="asset-usage">${item.usage}</div>
            <div class="asset-status pending">
              <span class="status-dot"></span>待生成
            </div>
          </div>
        </div>
      `;
    }
    return `
      <div class="asset-card" onclick="openAssetModal('${item.id}', '${currentAssetTab}')">
        <div class="asset-thumb">
          <img data-src="${item.file}" alt="${item.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\'pending-icon\'>&#128247;</span>';">
        </div>
        <div class="asset-details">
          <div class="asset-name">${item.name}</div>
          <div class="asset-usage">${item.usage}</div>
          <div class="asset-status ready">
            <span class="status-dot"></span>已就绪
          </div>
        </div>
      </div>
    `;
  }).join('');

  setupLazyLoad();
}

// ==================== 渲染分集列表 ====================
function renderEpisodeList() {
  const list = document.getElementById('episodeList');
  let currentChapter = '';
  let html = '';
  episodes.forEach(ep => {
    if (ep.chapter !== currentChapter) {
      currentChapter = ep.chapter;
      html += `<div class="chapter-label">${ep.chapter}</div>`;
    }
    const statusClass = ep.status === 'done' ? 'status-done' : ep.status === 'progress' ? 'status-progress' : 'status-wait';
    html += `
      <div class="episode-item ${ep.num === currentEpisode ? 'active' : ''}" onclick="loadEpisode(${ep.num})" data-ep="${ep.num}">
        <div class="episode-num">${String(ep.num).padStart(2,'0')}</div>
        <div class="episode-info">
          <div class="episode-title">${ep.title}</div>
          <div class="episode-meta">
            <span>${ep.duration}</span>
            <span>${ep.shots} shots</span>
          </div>
        </div>
        <div class="episode-status-dot ${statusClass}"></div>
      </div>
    `;
  });
  list.innerHTML = html;
}

// ==================== 加载剧集 ====================
function loadEpisode(num) {
  currentEpisode = num;
  currentShotIndex = 0;
  currentSubShotIndex = 0;

  // 更新列表高亮
  document.querySelectorAll('.episode-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.ep) === num);
  });

  const ep = episodes.find(e => e.num === num);
  const data = promptsData[num];
  if (!data) return;

  // 更新标题
  document.getElementById('promptTitle').textContent = `EP${String(num).padStart(2,'0')} - ${ep.title}`;

  // 渲染 Shot 标签（带模式图标）
  renderShotTabs(data);

  // 加载第一个 shot
  loadShot(0);
}

// ==================== 渲染 Shot 标签（带模式图标） ====================
function renderShotTabs(data) {
  const tabs = document.getElementById('shotTabs');
  if (!data.shots || data.shots.length <= 1) {
    tabs.style.display = 'none';
    return;
  }
  tabs.style.display = 'flex';
  tabs.innerHTML = data.shots.map((shot, idx) => {
    const modeIcon = shot.mode === 'frames'
      ? '<span class="shot-mode-icon frames-icon">F</span>'
      : '<span class="shot-mode-icon multishot-icon">M</span>';
    const label = `Shot ${idx + 1}`;
    return `<button class="shot-tab ${idx === 0 ? 'active' : ''}" onclick="loadShot(${idx})" data-shot="${idx}">${label}${modeIcon}</button>`;
  }).join('');
}

// ==================== 加载 Shot ====================
function loadShot(index) {
  currentShotIndex = index;
  currentSubShotIndex = 0;
  const data = promptsData[currentEpisode];
  if (!data || !data.shots || !data.shots[index]) return;

  const shot = data.shots[index];
  const shotMode = shot.mode;

  // 更新 shot 标签高亮
  document.querySelectorAll('.shot-tab').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.shot) === index);
  });

  // 更新模式指示器
  const modeBadge = document.getElementById('modeBadge');
  const modeReason = document.getElementById('modeReason');
  if (shotMode === 'frames') {
    modeBadge.className = 'mode-badge frames';
    modeBadge.innerHTML = '<span class="mode-icon">F</span> Frames 模式';
  } else {
    modeBadge.className = 'mode-badge multishot';
    modeBadge.innerHTML = '<span class="mode-icon">M</span> Multishot 模式';
  }
  modeReason.textContent = shot.modeReason || '';

  // 更新 meta 信息
  const refCount = shotMode === 'frames'
    ? (shot.refs ? shot.refs.length : 0)
    : ((shot.globalRef ? 1 : 0) + (shot.subShots ? shot.subShots.reduce((sum, s) => sum + (s.refs ? s.refs.length : 0), 0) : 0));
  document.getElementById('promptMeta').textContent = `${shotMode === 'frames' ? 'Frames' : 'Multishot'} 模式 | ${shot.duration || '15s'} | 9:16 | 参考图: ${refCount > 0 ? refCount + '张' : '无'}`;

  // 帧图区：仅 Frames 模式显示
  const framesArea = document.getElementById('framesArea');
  if (shotMode === 'frames') {
    framesArea.style.display = 'flex';
    const firstFrame = shot.firstFrame ? `<img src="${shot.firstFrame}" alt="首帧" onclick="openModal('${shot.firstFrame}','首帧')">` : '<div class="frame-label">首帧 First Frame</div><div class="frame-placeholder">待生成</div>';
    const lastFrame = shot.lastFrame ? `<img src="${shot.lastFrame}" alt="尾帧" onclick="openModal('${shot.lastFrame}','尾帧')">` : '<div class="frame-label">尾帧 Last Frame</div><div class="frame-placeholder">待生成</div>';
    document.getElementById('firstFrameBox').innerHTML = firstFrame;
    document.getElementById('firstFrameBox').className = 'frame-box ' + (shot.firstFrame ? 'has-image' : '');
    document.getElementById('lastFrameBox').innerHTML = lastFrame;
    document.getElementById('lastFrameBox').className = 'frame-box ' + (shot.lastFrame ? 'has-image' : '');
  } else {
    framesArea.style.display = 'none';
  }

  // 全局参考图区：仅 Multishot 模式显示
  const globalRefArea = document.getElementById('globalRefArea');
  const globalRefContent = document.getElementById('globalRefContent');
  if (shotMode === 'multishot' && shot.globalRef) {
    globalRefArea.style.display = 'flex';
    const ref = referenceImages.find(r => r.id === shot.globalRef);
    if (ref) {
      globalRefContent.innerHTML = `<div class="global-ref-chip"><img src="${ref.file}" alt="">${ref.name}</div>`;
    } else {
      globalRefContent.innerHTML = `<div class="global-ref-chip">${shot.globalRef}</div>`;
    }
  } else {
    globalRefArea.style.display = 'none';
    globalRefContent.innerHTML = '';
  }

  // 参考图详情区
  const refDetail = document.getElementById('refDetail');
  if (shotMode === 'frames' && shot.refs && shot.refs.length > 0) {
    refDetail.style.display = 'flex';
    refDetail.innerHTML = shot.refs.map(refId => {
      const ref = referenceImages.find(r => r.id === refId);
      return ref ? `<div class="ref-chip"><img src="${ref.file}" alt="">${ref.name}</div>` : '';
    }).join('');
  } else {
    refDetail.style.display = 'none';
    refDetail.innerHTML = '';
  }

  // 子 Shot 标签：仅 Multishot 模式且有多个子 shot 时显示
  const subshotTabs = document.getElementById('subshotTabs');
  if (shotMode === 'multishot' && shot.subShots && shot.subShots.length > 1) {
    subshotTabs.style.display = 'flex';
    subshotTabs.innerHTML = shot.subShots.map((ss, idx) => `
      <button class="subshot-tab ${idx === 0 ? 'active' : ''}" onclick="loadSubShot(${idx})" data-subshot="${idx}">
        ${ss.name}<span class="subshot-duration">${ss.duration}</span>
      </button>
    `).join('');
  } else {
    subshotTabs.style.display = 'none';
    subshotTabs.innerHTML = '';
  }

  // 渲染 Prompt 内容
  renderPromptContent(shot, shotMode);
}

// ==================== 加载子 Shot（Multishot 模式） ====================
function loadSubShot(index) {
  currentSubShotIndex = index;
  const data = promptsData[currentEpisode];
  if (!data || !data.shots || !data.shots[currentShotIndex]) return;
  const shot = data.shots[currentShotIndex];
  if (shot.mode !== 'multishot' || !shot.subShots) return;

  // 更新子 shot 标签高亮
  document.querySelectorAll('.subshot-tab').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.subshot) === index);
  });

  // 渲染子 shot 内容
  renderSubShotContent(shot, index);
}

// ==================== 渲染 Prompt 内容 ====================
function renderPromptContent(shot, mode) {
  const body = document.getElementById('promptBody');

  if (mode === 'frames') {
    // Frames 模式：4段式提示词
    body.innerHTML = `
      <div class="prompt-section">
        <div class="prompt-label">&#127748; 场景画面 Scene</div>
        <div class="prompt-content">${shot.prompt.scene}</div>
      </div>
      <div class="prompt-section">
        <div class="prompt-label">&#127909; 镜头运镜 Camera</div>
        <div class="prompt-content">${shot.prompt.camera}</div>
      </div>
      <div class="prompt-section">
        <div class="prompt-label">&#127911; 音频旁白 Audio</div>
        <div class="prompt-content">${shot.prompt.audio}</div>
      </div>
      <div class="prompt-section">
        <div class="prompt-label">&#127775; 画质规格 Quality</div>
        <div class="prompt-content">${shot.prompt.quality}</div>
      </div>
      <div class="prompt-actions">
        <button class="btn btn-primary" onclick="copyPrompt()">
          <span>&#128203;</span> 一键复制 Prompt
        </button>
        <button class="btn btn-secondary" onclick="copyPromptSection('scene')">
          复制场景
        </button>
        <button class="btn btn-secondary" onclick="copyPromptSection('camera')">
          复制运镜
        </button>
        <button class="btn btn-secondary" onclick="copyPromptSection('audio')">
          复制音频
        </button>
      </div>
    `;

    // 更新参考图数量
    const refCount = shot.refs ? shot.refs.length : 0;
    document.getElementById('refCount').innerHTML = `<button class="param-btn active">${refCount}</button>`;
  } else {
    // Multishot 模式
    if (shot.subShots && shot.subShots.length > 0) {
      renderSubShotContent(shot, 0);
    } else {
      body.innerHTML = '<div style="color:var(--text-muted);">无子镜头数据</div>';
    }
  }
}

// ==================== 渲染子 Shot 内容 ====================
function renderSubShotContent(shot, subIndex) {
  const body = document.getElementById('promptBody');
  const subShot = shot.subShots[subIndex];
  if (!subShot) return;

  // 子 shot 参考图
  let subRefHtml = '';
  if (subShot.refs && subShot.refs.length > 0) {
    subRefHtml = `
      <div class="subshot-ref-area">
        ${subShot.refs.map(refId => {
          const ref = referenceImages.find(r => r.id === refId);
          return ref ? `<div class="ref-chip"><img src="${ref.file}" alt="">${ref.name}</div>` : '';
        }).join('')}
      </div>
    `;
  }

  // 时长分配信息
  let durationInfo = '';
  if (shot.subShots.length > 1) {
    durationInfo = `<div style="font-size:11px; color:var(--text-muted); margin-bottom:12px;">总时长: ${shot.duration} | ${shot.subShots.map(s => s.name + ' ' + s.duration).join(' + ')}</div>`;
  }

  // prompt can be string or object {scene, camera}
  const promptText = typeof subShot.prompt === 'string' ? subShot.prompt : 
    (subShot.prompt.scene || '') + (subShot.prompt.camera ? '\n\n镜头运镜：' + subShot.prompt.camera : '');

  body.innerHTML = `
    ${durationInfo}
    <div class="prompt-section">
      <div class="prompt-label">&#127748; 画面+运镜 Prompt (${subShot.name})</div>
      <div class="prompt-content">${promptText}</div>
    </div>
    ${subRefHtml}
    <div class="shared-section">
      <div class="shared-label">&#127911; 音频旁白 Audio（全镜头共享）</div>
      <div class="prompt-content">${shot.audio || ''}</div>
    </div>
    <div class="shared-section">
      <div class="shared-label">&#127775; 画质规格 Quality（全镜头共享）</div>
      <div class="prompt-content">${shot.quality || ''}</div>
    </div>
    <div class="prompt-actions">
      <button class="btn btn-primary" onclick="copyPrompt()">
        <span>&#128203;</span> 一键复制 Prompt
      </button>
      <button class="btn btn-secondary" onclick="copyPromptSection('prompt')">
        复制画面
      </button>
      <button class="btn btn-secondary" onclick="copyPromptSection('audio')">
        复制音频
      </button>
    </div>
  `;

  // 更新参考图数量
  const totalRefs = (shot.globalRef ? 1 : 0) + (subShot.refs ? subShot.refs.length : 0);
  document.getElementById('refCount').innerHTML = `<button class="param-btn active">${totalRefs}</button>`;
}

// ==================== 复制功能 ====================
function copyPrompt() {
  const data = promptsData[currentEpisode];
  if (!data || !data.shots || !data.shots[currentShotIndex]) return;
  const shot = data.shots[currentShotIndex];

  let text = '';
  if (shot.mode === 'frames') {
    text = `场景画面：${shot.prompt.scene}\n\n镜头运镜：${shot.prompt.camera}\n\n音频旁白：${shot.prompt.audio}\n\n画质规格：${shot.prompt.quality}`;
  } else {
    const subShot = shot.subShots[currentSubShotIndex] || shot.subShots[0];
    if (subShot) {
      const promptText = typeof subShot.prompt === 'string' ? subShot.prompt : 
        (subShot.prompt.scene || '') + (subShot.prompt.camera ? '\n\n镜头运镜：' + subShot.prompt.camera : '');
      text = `画面+运镜（${subShot.name}）：${promptText}\n\n音频旁白（全镜头共享）：${shot.audio || ''}\n\n画质规格（全镜头共享）：${shot.quality || ''}`;
    }
  }
  navigator.clipboard.writeText(text).then(() => showToast('Prompt 已复制到剪贴板'));
}

function copyPromptSection(section) {
  const data = promptsData[currentEpisode];
  if (!data || !data.shots || !data.shots[currentShotIndex]) return;
  const shot = data.shots[currentShotIndex];
  let text = '';

  if (shot.mode === 'frames') {
    if (section === 'scene') text = shot.prompt.scene;
    else if (section === 'camera') text = shot.prompt.camera;
    else if (section === 'audio') text = shot.prompt.audio;
  } else {
    const subShot = shot.subShots[currentSubShotIndex] || shot.subShots[0];
    if (subShot) {
      if (section === 'prompt') text = typeof subShot.prompt === 'string' ? subShot.prompt : (subShot.prompt.scene || '');
      else if (section === 'audio') text = shot.audio || '';
    }
  }
  navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板'));
}

// ==================== 参数控制 ====================
function toggleAudio(on) {
  audioEnabled = on;
  document.getElementById('audio-on').classList.toggle('active', on);
  document.getElementById('audio-off').classList.toggle('active', !on);
}

function setRatio(btn, ratio) {
  currentRatio = ratio;
  btn.parentElement.querySelectorAll('.param-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function setDuration(btn, duration) {
  currentDuration = duration;
  btn.parentElement.querySelectorAll('.param-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function generateVideo() {
  showToast('模拟生成中... (Kling O3 1080P)');
  setTimeout(() => {
    showToast('生成任务已提交！');
  }, 1500);
}

// ==================== 图片放大（增强版） ====================
function openModal(src, caption) {
  document.getElementById('modalImage').src = src;
  document.getElementById('modalCaption').textContent = caption || '';
  document.getElementById('modalInfo').style.display = 'none';
  document.getElementById('modalActions').style.display = 'none';
  currentModalAsset = null;
  document.getElementById('imageModal').classList.add('active');
}

function openAssetModal(itemId, category) {
  const items = assetData[category] || [];
  const item = items.find(i => i.id === itemId);
  if (!item || !item.file) return;

  currentModalAsset = item;

  const img = document.getElementById('modalImage');
  img.src = item.file;
  document.getElementById('modalCaption').textContent = item.name;

  const infoPanel = document.getElementById('modalInfo');
  infoPanel.style.display = 'block';

  const fileName = item.file.split('/').pop();
  document.getElementById('modalFileName').textContent = fileName;
  document.getElementById('modalFileUsage').textContent = item.usage;
  document.getElementById('modalFileSize').textContent = '加载中...';

  const localPath = 'computer:///workspace/.uploads/' + fileName;
  document.getElementById('modalFilePath').innerHTML = `<span class="file-path" onclick="copyFilePath()" title="点击复制路径">${localPath}</span>`;

  document.getElementById('modalActions').style.display = 'flex';
  document.getElementById('imageModal').classList.add('active');
}

function onModalImageLoad(img) {
  if (currentModalAsset) {
    const w = img.naturalWidth;
    const h = img.naturalHeight;
    document.getElementById('modalFileSize').textContent = `${w} x ${h} px`;
  }
}

function copyFilePath() {
  if (!currentModalAsset) return;
  const fileName = currentModalAsset.file.split('/').pop();
  const localPath = 'computer:///workspace/.uploads/' + fileName;
  navigator.clipboard.writeText(localPath).then(() => showToast('路径已复制到剪贴板'));
}

function viewOriginalImage() {
  if (!currentModalAsset) return;
  const fileName = currentModalAsset.file.split('/').pop();
  const localPath = 'computer:///workspace/.uploads/' + fileName;
  window.open(localPath, '_blank');
}

function closeModal() {
  document.getElementById('imageModal').classList.remove('active');
  currentModalAsset = null;
}

// ==================== Toast ====================
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ==================== 懒加载 ====================
function setupLazyLoad() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const img = entry.target;
        if (img.dataset.src) {
          img.src = img.dataset.src;
          img.removeAttribute('data-src');
        }
        observer.unobserve(img);
      }
    });
  }, { rootMargin: '50px' });

  document.querySelectorAll('img[data-src]').forEach(img => observer.observe(img));
}

// ==================== 键盘快捷键 ====================
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowUp' && currentEpisode > 1) {
    loadEpisode(currentEpisode - 1);
  }
  if (e.key === 'ArrowDown' && currentEpisode < 27) {
    loadEpisode(currentEpisode + 1);
  }
  if (e.key === 'ArrowLeft' && currentShotIndex > 0) {
    loadShot(currentShotIndex - 1);
  }
  if (e.key === 'ArrowRight') {
    const data = promptsData[currentEpisode];
    if (data && data.shots && currentShotIndex < data.shots.length - 1) {
      loadShot(currentShotIndex + 1);
    }
  }
});

// ==================== 拖放上传参考图到素材库 ====================
function setupAssetDrop() {
  const grid = document.getElementById('assetGrid');
  if (!grid) return;

  // 创建拖放提示遮罩
  const dropOverlay = document.createElement('div');
  dropOverlay.id = 'dropOverlay';
  dropOverlay.style.cssText = `
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); z-index: 9999;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; pointer-events: none;
  `;
  dropOverlay.innerHTML = `
    <div style="font-size:48px; margin-bottom:16px;">&#128444;</div>
    <div style="font-size:18px; color:#fff; font-weight:600;">拖放图片到素材库</div>
    <div style="font-size:13px; color:#aaa; margin-top:8px;">支持 PNG / JPG / WEBP</div>
  `;
  document.body.appendChild(dropOverlay);

  // 全局拖放事件
  document.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropOverlay.style.display = 'flex';
  });
  document.addEventListener('dragleave', (e) => {
    if (e.relatedTarget === null) {
      dropOverlay.style.display = 'none';
    }
  });
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    dropOverlay.style.display = 'none';
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    if (files.length === 0) return;
    handleDroppedImages(files);
  });
}

function handleDroppedImages(files) {
  let added = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      // 生成唯一ID
      const id = 'drop-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
      const name = file.name.replace(/\.[^.]+$/, '').substring(0, 20);
      // 添加到当前分类
      const category = currentAssetTab;
      if (assetData[category]) {
        assetData[category].push({
          id: id,
          name: name,
          usage: '拖放上传',
          file: dataUrl,
          status: 'ready'
        });
        added++;
        // 同时添加到 referenceImages
        referenceImages.push({
          id: id,
          name: name,
          tag: '拖放上传',
          file: dataUrl
        });
        // 刷新显示
        renderAssetGrid();
        updateAssetCounts();
        showToast(`已添加 ${added} 张图片到「${getCategoryName(category)}」`);
      }
    };
    reader.readAsDataURL(file);
  });
}

function getCategoryName(cat) {
  const map = { characters: '角色', scenes: '场景', costumes: '服装', props: '道具', pending: '待生成' };
  return map[cat] || cat;
}

// ==================== 启动 ====================
document.addEventListener('DOMContentLoaded', () => {
  init();
  setupAssetDrop();
});
</script>
